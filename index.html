    }
    html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;}
    input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;outline:none;cursor:pointer;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--teal);cursor:pointer;transition:transform .1s;}

    .scroll{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--dim) transparent;}
    .btn{padding:7px 16px;border-radius:7px;border:0.5px solid var(--border2);background:transparent;color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;}

    .card:hover{border-color:rgba(0,212,170,0.3);}
    .tag{display:inline-block;font-size:9px;padding:2px 8px;border-radius:99px;font-weight:600;letter-spacing:.04em;}
    .section-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;font-weight:600;}

// ═══════════════════════════════════════════════════════════════
// MOTOR CIENTÍFICO
// ═══════════════════════════════════════════════════════════════
function calcScore(v){
  let s=0;
  const {Ca,Fe,P,Mg,Cu,S,O2,CO2,H2S,N2,H2O,Temp,pH,pressure,gravity,Si,Mo,Ni,V}=v;
  // Solvente
  const hasLiquid=H2O>0||(Temp<-50&&N2>50);
  if(hasLiquid&&Temp>=-20&&Temp<=50)s+=0.25*Math.min(H2O/50,1);
  else if(hasLiquid)s+=0.08*Math.min(H2O/50,1);
  // Energía
  if(O2>=15)s+=0.20;else if(O2>=5)s+=0.12;else if(H2S>=1||CO2>=1)s+=0.07;
  // CHNOPS
  if(Ca>=5)s+=0.07;if(P>=0.3)s+=0.07;if(Fe>=5)s+=0.05;if(Mg>=10)s+=0.05;
  if(Mo>=0.5)s+=0.03;if(Ni>=10)s+=0.02;
  // Temperatura
  if(Temp>=-20&&Temp<=50)s+=0.15;else if(Temp>=-80&&Temp<=100)s+=0.07;
  // pH
  if(pH>=5.5&&pH<=9)s+=0.07;else if(pH>=2&&pH<=12)s+=0.03;
  // Presión
  if(pressure>=0.3&&pressure<=3)s+=0.04;else if(pressure<10)s+=0.01;
  return Math.min(s,1.0);
}

function generateCreatureProfile(v,seed=0){
  const {Ca,Fe,Si,P,Mg,Cu,Mn,Mo,S,Ni,V,O2,CO2,H2S,N2,H2O,Temp,pH,pressure,gravity}=v;
  const score=calcScore(v);
  const rng=(n)=>((Math.sin(seed*9301+n*49297+233)%1)+1)%1;

  // Simetría
  const symmetry=Ca>20&&O2>10?"bilateral":H2O>50&&Ca<10?"radial":rng(1)>0.5?"bilateral":"radial";

  // Organización
  const multicell=score>0.5&&O2>5&&P>0.2;
  const complexity=score>0.75?"vertebrado":score>0.55?"invertebrado complejo":score>0.35?"simple":score>0.15?"colonial":"unicelular";

  // Esqueleto
  let skeleton,skeletonMat,skeletonColor;
  if(Ca>=30&&P>=0.5&&Mg>=5&&Temp>=-50&&Temp<=55&&gravity<=2){
    skeleton="Endoesqueleto calcico";skeletonMat="Hidroxiapatita Ca₁₀(PO₄)₆(OH)₂";skeletonColor="#FBBF24";
  }else if(Si>=80&&H2O>=5){
    skeleton="Exoesqueleto silíceo";skeletonMat="SiO₂ amorfo biogénico";skeletonColor="#60A5FA";
  }else if(Ca>=20&&pH>=7.5&&CO2>=0.01){
    skeleton="Exoesqueleto calcáreo";skeletonMat="CaCO₃ aragonita/calcita";skeletonColor="#4ADE80";
  }else if(gravity>2){
    skeleton="Hidrostático reforzado";skeletonMat="Fluido presurizado + músculo";skeletonColor="#94A3B8";
  }else if(S>5000){
    skeleton="Exoesqueleto sulfúrico";skeletonMat="FeS₂ pirita biogénica";skeletonColor="#F87171";
  }else{
    skeleton="Hidrostático/Quitina";skeletonMat="Polisacárido N-acetilglucosamina";skeletonColor="#94A3B8";
  }

  // Pigmento sanguíneo
  let blood,bloodColor,bloodDesc;
  if(Fe>=30&&O2>=2){blood="Hemoglobina";bloodColor="#F87171";bloodDesc="Fe²⁺ en porfirina — sangre roja";}
  else if(Cu>=60&&Fe<25){blood="Hemocianina";bloodColor="#60A5FA";bloodDesc="Cu²⁺ en hemolinfa — sangre azul";}
  else if(V>=200&&H2O>20){blood="Vanadina";bloodColor="#4ADE80";bloodDesc="V³⁺ en vanádocitos — sangre verde";}
  else if(H2S>1&&O2<8){blood="Hb-H₂S gigante";bloodColor="#FBBF24";bloodDesc="36 subunidades — fumarolas";}
  else if(Fe>=10&&Fe<30){blood="Hemeritrina";bloodColor="#A78BFA";bloodDesc="2 Fe no hemo — sangre violeta";}
  else{blood="Sin pigmento";bloodColor="#94A3B8";bloodDesc="Difusión directa de gases";}

  // Metabolismo
  let metabolism,metaIcon,metaColor;
  if(O2>=15&&Fe>=1&&Cu>=5){metabolism="Aeróbico eficiente";metaIcon="⚡";metaColor="#00D4AA";}
  else if(Mg>=12&&Mn>=100&&Fe>=8&&CO2>=0.005&&O2>=3){metabolism="Fotosíntesis oxigénica";metaIcon="☀️";metaColor="#4ADE80";}
  else if(H2S>=1&&S>=100&&Fe>=5){metabolism="Quimiosíntesis H₂S";metaIcon="🌋";metaColor="#FBBF24";}
  else if(Fe>=20&&CO2>=1&&O2<2){metabolism="Quimiosíntesis Fe²⁺";metaIcon="⛏";metaColor="#F87171";}
  else if(O2<0.1&&CO2>=0.1&&Ni>=20){metabolism="Metanogénesis";metaIcon="💨";metaColor="#94A3B8";}
  else if(Mo>=1&&N2>=5&&O2<2){metabolism="Fijación N₂";metaIcon="🔬";metaColor="#60A5FA";}
  else{metabolism="Fermentación anaeróbica";metaIcon="🧫";metaColor="#94A3B8";}

  // Sistema nervioso
  let nervous,nervousColor;
  if(O2>=15&&Ca>=25&&Fe>=20&&P>=0.5){nervous="Cerebro centralizado";nervousColor="#A78BFA";}
  else if(Ca>=10&&O2>=5&&complexity!=="unicelular"){nervous="Sistema gangliado";nervousColor="#60A5FA";}
  else if(complexity==="unicelular"){nervous="Sin sistema nervioso";nervousColor="#94A3B8";}
  else{nervous="Red nerviosa difusa";nervousColor="#94A3B8";}

  // Termorregulación
  let thermo,thermoColor;
  if(O2>=18&&Temp>=-50&&Temp<=55&&metabolism==="Aeróbico eficiente"){thermo="Homeotermo";thermoColor="#F87171";}
  else if(Temp<=-10){thermo="Crioprotección AFP";thermoColor="#60A5FA";}
  else if(Temp>=80){thermo="Termoestable";thermoColor="#FBBF24";}
  else{thermo="Poiquilotermo";thermoColor="#4ADE80";}

  // Locomoción
  let locomotion;
  if(gravity<0.3)locomotion="Flotación/vuelo";
  else if(H2O>50&&gravity<2)locomotion="Natación";
  else if(gravity>2)locomotion="Rastrero";
  else if(O2>15&&complexity==="vertebrado")locomotion="Cuadrúpedo/Bípedo";
  else locomotion="Ondulatorio";

  // Reproducción
  let repro;
  if(Ca>=25&&pH>=7.5&&Temp>5&&Temp<45)repro="Oviparismo calcificado";
  else if(O2>15&&Ca>20&&complexity==="vertebrado")repro="Viviparismo placentario";
  else if(H2O>30)repro="Sexual externa acuática";
  else repro="Fisión binaria / Gemación";

  // Tegumento
  let skin,skinColor;
  if(Cu>=30&&Fe>=10)skin="Piel melanizada";
  else if(Temp<-20)skin="Pelaje/cutícula aislante";
  else if(H2S>2||pH<4)skin="Cutícula química resistente";
  else if(H2O<10&&Temp>30)skin="Exoesqueleto impermeabilizante";
  else skin="Piel permeable/escamas";

  // Tamaño estimado
  let size,sizeKg;
  const baseSize=Math.max(0.001, score*100*(gravity<0.5?10:1)*(O2/21)*Math.max(0.1,Ca/41));
  if(baseSize>10000)size="Megafauna (>10 ton)";
  else if(baseSize>500)size="Grande (100kg–10t)";
  else if(baseSize>10)size="Mediano (10–100kg)";
  else if(baseSize>0.1)size="Pequeño (100g–10kg)";
  else if(baseSize>0.00001)size="Micro (< 1g)";
  else size="Unicelular (µm)";
  sizeKg=baseSize;

  // Sentidos
  const senses=[];
  if(O2>5)senses.push("Quimiorreceptores");
  if(Temp>-100&&Temp<100)senses.push("Termorreceptores");
  if(nervous!=="Sin sistema nervioso"&&nervous!=="Red nerviosa difusa")senses.push("Fotorreceptores");
  if(complexity==="vertebrado")senses.push("Mecanorreceptores","Electrorreceptores");
  if(Fe>20)senses.push("Magnetorreceptores");

  // Nombre científico único
  const genera=["Astrobiota","Xenovita","Cosmozoa","Abiogenus","Exobiota","Lithovita","Chemovita","Thermozoa","Cryptovita","Halobiota","Pyrovita","Glaciovita"];
  const species=["stellaris","extremophilus","mineralis","novus","alienus","profundus","thermalis","glacialis","sulfuricus","magneticus","siliceus","cupriferus"];
  const genus=genera[Math.floor(rng(3)*genera.length)];
  const sp=species[Math.floor(rng(4)*species.length)];
  const latinName=`${genus} ${sp}`;

  // Color dominante del organismo
  const orgColor=bloodColor;

  return {
    latinName,complexity,symmetry,skeleton,skeletonMat,skeletonColor,
    blood,bloodColor,bloodDesc,metabolism,metaIcon,metaColor,
    nervous,nervousColor,thermo,thermoColor,locomotion,repro,skin,
    size,sizeKg,senses,score,orgColor,seed,
    // Para el prompt de imagen
    imagePrompt:buildImagePrompt({latinName,skeleton,blood,bloodColor,metabolism,thermo,locomotion,skin,size,complexity,symmetry,v}),
    planetImagePrompt:buildPlanetImagePrompt(v),
  };
}

function buildImagePrompt({latinName,skeleton,blood,bloodColor,metabolism,thermo,locomotion,skin,size,complexity,symmetry,v}){
  const {Temp,H2O,H2S,O2,pH}=v;
  const env=H2O>60?"deep alien ocean":Temp<-30?"frozen tundra glacial":H2S>3?"sulfuric volcanic vents":O2>25?"lush carboniferous jungle":"alien landscape";
  const bloodDesc=bloodColor==="#F87171"?"crimson red blood":bloodColor==="#60A5FA"?"electric blue hemocyanin blood":bloodColor==="#4ADE80"?"vivid green vanadium blood":bloodColor==="#A78BFA"?"violet hemerythrin blood":"translucent fluid";
  const sizeDesc=size.includes("Mega")?"enormous massive":size.includes("Grande")?"large powerful":size.includes("Mediano")?"medium sized":"small";
  const bodyType=symmetry==="bilateral"?"bilateral symmetry alien creature":"radial symmetry alien organism";
  return `Hyper-detailed scientific illustration of ${latinName}, a ${sizeDesc} ${complexity} alien organism with ${bodyType}, ${skeleton.toLowerCase()}, ${bloodDesc}, ${metabolism.toLowerCase()} metabolism, ${skin.toLowerCase()}, living in ${env}. Bioluminescent details, alien biology, scientifically coherent, otherworldly, stunning composition, dramatic lighting, 8k ultra detailed, concept art, science fiction realism`;
}

function buildPlanetImagePrompt(v){
  const {H2O,Temp,H2S,O2,CO2,Si,Fe,Ca,S,N2}=v;
  const hasSulf=H2S>2||S>5000,isHot=Temp>50,isCold=Temp<-30,hasOcean=H2O>30;
  const atmColor=hasSulf?"yellow sulfuric clouds":CO2>5?"thick orange CO2 atmosphere":O2>20?"thin blue atmosphere":"dark atmospheric haze";
  const surfaceColor=hasSulf?"yellow sulfur flats":isCold?"icy blue frozen surface":isHot?"red volcanic rocky":Fe>50?"red iron oxide":Ca>50?"white limestone":"green blue living planet";
  const features=[];
  if(hasOcean)features.push(hasSulf?"sulfuric acid oceans":"vast alien oceans");
  if(isCold)features.push("ice caps","frozen glaciers");
  if(H2S>3)features.push("volcanic vents","geysers");
  if(O2>20)features.push("lush vegetation visible from space");
  return `Photorealistic render of an alien planet from space, ${surfaceColor}, ${atmColor}, ${features.join(", ")}, dramatic lighting from a distant star, detailed surface textures, scientifically accurate, NASA style photography, 8k ultra detailed, stunning cosmic view`;
}

// GENERADOR DE CÓDIGO ÚNICO DE PLANETA
// ═══════════════════════════════════════════════════════════════
function generatePlanetCode(vals){
  const keys=["Ca","Fe","Si","P","Mg","Cu","Mn","Mo","S","Ni","V","O2","CO2","H2S","N2","H2O","Temp","pH","pressure","gravity"];
  const hash=keys.reduce((acc,k,i)=>{
    const v=Math.round((vals[k]||0)*100);
    return acc^(v*(i+1)*2654435761)>>>0;
  },0);
  const base36=hash.toString(36).toUpperCase().padStart(8,"0");
  const segments=[base36.slice(0,3),base36.slice(3,6),base36.slice(6,8)];
  const prefix=vals.H2O>50?"OCN":vals.H2S>3?"VLC":vals.Temp<-30?"GLC":vals.O2>20?"TER":"XEN";
  return `BP-${prefix}-${segments.join("-")}`;
}

function generateCreatureSeed(vals,creatureIdx){
  const keys=["Ca","Fe","Si","P","Mg","Cu","O2","H2S","Temp","pH"];
  return keys.reduce((acc,k,i)=>acc+(vals[k]||0)*(i+1),creatureIdx*1000)%99999;
}

  const ref=useRef(null);

  useEffect(()=>{
    const c=ref.current;if(!c||!window.THREE)return;
    const T=window.THREE;
    const W=c.parentElement.clientWidth||500,H=c.parentElement.clientHeight||400;
    c.width=W;c.height=H;
    const scene=new T.Scene(),cam=new T.PerspectiveCamera(45,W/H,0.1,100);
    cam.position.z=3.5;
    const renderer=new T.WebGLRenderer({canvas:c,antialias:true});
    renderer.setSize(W,H);renderer.setClearColor(0x03060E,1);
    const sp=[];for(let i=0;i<1200;i++)sp.push((Math.random()-.5)*200,(Math.random()-.5)*200,(Math.random()-.5)*200);
    const stars=new T.Points(new T.BufferGeometry(),new T.PointsMaterial({color:0xffffff,size:0.06}));
    stars.geometry.setAttribute('position',new T.Float32BufferAttribute(sp,3));
    scene.add(stars);
    const grp=new T.Group();scene.add(grp);
    const makeTex=v=>{
      const sz=512,cv=document.createElement('canvas');cv.width=cv.height=sz;
      const ctx=cv.getContext('2d'),img=ctx.createImageData(sz,sz),d=img.data;
      const {H2S,S,Temp,O2,Fe,Mg,Ca,H2O}=v;
      const sulf=H2S>2||S>5000,hot=Temp>50,cold=Temp<-30,green=Mg>20&&O2>8&&!sulf&&!hot;
      function hs(x,y){return((Math.sin(x*127.1+y*311.7)*43758.5453)%1+1)%1;}
      function ns(x,y){const X=Math.floor(x),Y=Math.floor(y),f=x-X,g=y-Y,a=hs(X,Y),b=hs(X+1,Y),c=hs(X,Y+1),dd=hs(X+1,Y+1),u=f*f*(3-2*f),vv=g*g*(3-2*g);return a+(b-a)*u+(c-a)*vv+(a-b-c+dd)*u*vv;}
      let[bR,bG,bB]=sulf?[180,150,20]:cold?[100,140,190]:hot?[170,60,20]:green?[40,110,50]:Fe>50?[150,70,30]:[50,100,70];
      for(let y=0;y<sz;y++){const lat=y/sz;for(let x=0;x<sz;x++){
        const n1=ns(x/sz*8,lat*8)*.5+ns(x/sz*16,lat*16)*.3+ns(x/sz*32,lat*32)*.2;
        const n2=ns(x/sz*4+3.7,lat*4+2.1);
        const ocean=H2O>25&&n1<0.35,polar=(lat<0.1||lat>0.9)&&!sulf&&!hot;
        let r,g,b;
        if(polar){[r,g,b]=[220,235,255];}
        else if(ocean){[r,g,b]=sulf?[80,100,20]:[20+n2*20,55+n2*30,140+n2*40];}
        else{r=bR+(n1-.5)*40;g=bG+(n1-.5)*30;b=bB+(n1-.5)*25;}
        const i=(y*sz+x)*4;d[i]=Math.max(0,Math.min(255,r));d[i+1]=Math.max(0,Math.min(255,g));d[i+2]=Math.max(0,Math.min(255,b));d[i+3]=255;
      }}
      ctx.putImageData(img,0,0);return new T.CanvasTexture(cv);
    };
    const planet=new T.Mesh(new T.SphereGeometry(1,64,64),new T.MeshPhongMaterial({map:makeTex(vals),specular:new T.Color(0x222222),shininess:20}));
    grp.add(planet);
    const csz=256,cv2=document.createElement('canvas');cv2.width=cv2.height=csz;
    const cx=cv2.getContext('2d'),ci=cx.createImageData(csz,csz),cd=ci.data;
    function ch2(x,y){return((Math.sin(x*97+y*271)*43758)%1+1)%1;}
    function cn2(x,y){const X=Math.floor(x),Y=Math.floor(y),f=x-X,g=y-Y,a=ch2(X,Y),b=ch2(X+1,Y),c=ch2(X,Y+1),d=ch2(X+1,Y+1),u=f*f*(3-2*f),v=g*g*(3-2*g);return a+(b-a)*u+(c-a)*v+(a-b-c+d)*u*v;}
    for(let y=0;y<csz;y++)for(let x=0;x<csz;x++){const v=cn2(x/csz*6,y/csz*6)*.6+cn2(x/csz*12,y/csz*12)*.4;const al=v>0.52?Math.min((v-.52)*5*255,180):0;const i=(y*csz+x)*4;cd[i]=255;cd[i+1]=255;cd[i+2]=255;cd[i+3]=al;}
    cx.putImageData(ci,0,0);
    const clouds=new T.Mesh(new T.SphereGeometry(1.015,32,32),new T.MeshPhongMaterial({map:new T.CanvasTexture(cv2),transparent:true,opacity:vals.H2O>20?.55:.1,depthWrite:false}));
    grp.add(clouds);
    const score=calcScore(vals);
    const atmC=vals.H2S>2?0xD4A017:vals.CO2>5?0xF5A623:score>0.6?0x00D4AA:0x334466;
    const atm=new T.Mesh(new T.SphereGeometry(1.12,32,32),new T.MeshPhongMaterial({color:atmC,transparent:true,opacity:0.1,side:T.BackSide}));
    grp.add(atm);
    scene.add(Object.assign(new T.DirectionalLight(0xffffff,1.4),{position:{set:(v=>({x:v[0],y:v[1],z:v[2]}))([5,3,5])}}));
    const dl=new T.DirectionalLight(0xffffff,1.4);dl.position.set(5,3,5);scene.add(dl);
    scene.add(new T.AmbientLight(0x151515,.9));
    let drag=false,prev={x:0,y:0},zoom=3.5,animId;
    const dn=e=>{drag=true;prev={x:e.clientX,y:e.clientY};};
    const up=()=>drag=false;
    const mv=e=>{if(!drag)return;grp.rotation.y+=(e.clientX-prev.x)*.008;grp.rotation.x+=(e.clientY-prev.y)*.008;prev={x:e.clientX,y:e.clientY};};
    const wh=e=>{zoom=Math.max(1.8,Math.min(6,zoom+e.deltaY*.005));cam.position.z=zoom;e.preventDefault();};
    c.addEventListener('mousedown',dn);window.addEventListener('mouseup',up);window.addEventListener('mousemove',mv);c.addEventListener('wheel',wh,{passive:false});
    const anim=()=>{animId=requestAnimationFrame(anim);if(!drag){grp.rotation.y+=.002;clouds.rotation.y-=.0005;}renderer.render(scene,cam);};
    anim();
    st.current={planet,clouds,atm,makeTex,T,animId,cleanup:()=>{cancelAnimationFrame(animId);c.removeEventListener('mousedown',dn);window.removeEventListener('mouseup',up);window.removeEventListener('mousemove',mv);c.removeEventListener('wheel',wh);renderer.dispose();}};
    return()=>st.current.cleanup&&st.current.cleanup();
  },[]);
  useEffect(()=>{
    const{planet,clouds,atm,makeTex,T}=st.current;
    if(!planet||!T)return;
    planet.material.map=makeTex(vals);planet.material.map.needsUpdate=true;
    if(atm){const c=vals.H2S>2?0xD4A017:vals.CO2>5?0xF5A623:calcScore(vals)>0.6?0x00D4AA:0x334466;atm.material.color.set(c);}
    if(clouds)clouds.material.opacity=vals.H2O>20?.55:vals.H2O>5?.2:.05;
  },[vals]);
  return <canvas ref={ref} style={{width:'100%',height:'100%',display:'block'}}/>;
}

// COMPONENTE: IMAGEN IA (Pollinations)
// ═══════════════════════════════════════════════════════════════
function AIImage({prompt,width=400,height=300,style={}}){
  const [loaded,setLoaded]=useState(false);
  const [error,setError]=useState(false);
  const encoded=encodeURIComponent(prompt);
  const seed=useMemo(()=>Math.floor(Math.random()*99999),[prompt]);
  const url=`https://image.pollinations.ai/prompt/${encoded}?width=${width}&height=${height}&seed=${seed}&nologo=true`;
  return(
    <div style={{position:'relative',width:'100%',borderRadius:10,overflow:'hidden',background:'#0C1525',...style}}>
      {!loaded&&!error&&(
        <div className="skeleton" style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8}}>
          <div style={{width:32,height:32,border:'3px solid rgba(0,212,170,0.3)',borderTop:'3px solid #00D4AA',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
          <div style={{fontSize:10,color:'#2D3A55'}}>Generando imagen IA…</div>
        </div>
      )}
      {error&&(
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:6,padding:16,textAlign:'center'}}>
          <div style={{fontSize:20}}>🎨</div>
          <div style={{fontSize:10,color:'#2D3A55'}}>Conecta a internet para generar imágenes IA</div>
        </div>
      )}
      <img src={url} alt={prompt.slice(0,50)} onLoad={()=>setLoaded(true)} onError={()=>setError(true)}
        style={{width:'100%',height:'100%',objectFit:'cover',display:loaded?'block':'none',transition:'opacity .3s'}}/>
    </div>
  );
}

                <div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--dim)',marginBottom:6,paddingBottom:4,borderBottom:'0.5px solid rgba(255,255,255,0.04)'}}>{g}</div>
                {ms.map(m=>{
                  const dec=m.step<1?(m.step<0.01?4:2):0;
                  const pct=((vals[m.sym]-m.min)/(m.max-m.min)*100).toFixed(0);
                  return(
                    <div key={m.sym} style={{marginBottom:9}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                        <span style={{fontSize:9,color:'var(--muted)',fontFamily:'JetBrains Mono,monospace',display:'flex',alignItems:'center',gap:4}}>
                          <span style={{width:6,height:6,borderRadius:1,background:m.color,display:'inline-block',opacity:.8}}/>
                          {m.sym} <span style={{color:'var(--dim)'}}>{m.label}</span>
                        </span>
                        <span style={{fontSize:9,color:'var(--teal)',fontFamily:'JetBrains Mono,monospace'}}>{vals[m.sym].toFixed(dec)} {m.unit}</span>
                      </div>
                      <input type="range" min={m.min} max={m.max} step={m.step} value={vals[m.sym]} onChange={e=>setVal(m.sym,parseFloat(e.target.value))}
                        style={{accentColor:m.color}}/>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>

          {/* Centro */}
          <div style={{display:'flex',flexDirection:'column',overflow:'hidden',background:'var(--bg)'}}>
            <div style={{flex:1,position:'relative',minHeight:0}}>
              <PlanetCanvas vals={vals}/>
              <div style={{position:'absolute',top:14,right:14,display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end',pointerEvents:'none'}}>
                <div style={{background:`${scoreColor}15`,border:`1px solid ${scoreColor}40`,borderRadius:10,padding:'10px 16px',textAlign:'center',backdropFilter:'blur(8px)'}}>
                  <div style={{fontSize:32,fontWeight:800,color:scoreColor,fontFamily:'JetBrains Mono,monospace',lineHeight:1}}>{Math.round(score*100)}</div>
                  <div style={{fontSize:9,color:scoreColor,letterSpacing:'.08em',marginTop:3}}>{scoreLabel}</div>
                </div>
                <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:10,color:'rgba(0,212,170,0.6)',background:'rgba(0,212,170,0.08)',borderRadius:6,padding:'3px 8px'}}>
                  {generatePlanetCode(vals)}
                </div>
              </div>
              <div style={{position:'absolute',bottom:10,left:10,fontSize:9,color:'var(--dim)'}}>Arrastra para rotar · Scroll para zoom</div>
            </div>
            {/* Rasgos criatura 1 */}
            <div style={{borderTop:'1px solid var(--border)',padding:'10px 14px',background:'var(--bg2)'}}>
              <div className="section-label">Rasgos emergentes — Criatura principal</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:5}}>
                {[
                  {l:"Esqueleto",v:currentCreatures[0]?.skeleton||'—',c:currentCreatures[0]?.skeletonColor||'#94A3B8'},
                  {l:"Sangre",v:currentCreatures[0]?.blood||'—',c:currentCreatures[0]?.bloodColor||'#94A3B8'},
                  {l:"Metabolismo",v:currentCreatures[0]?.metabolism||'—',c:currentCreatures[0]?.metaColor||'#94A3B8'},
                  {l:"Nervioso",v:currentCreatures[0]?.nervous||'—',c:currentCreatures[0]?.nervousColor||'#94A3B8'},
                  {l:"Termoreg.",v:currentCreatures[0]?.thermo||'—',c:currentCreatures[0]?.thermoColor||'#94A3B8'},
                  {l:"Tamaño",v:currentCreatures[0]?.size||'—',c:'#94A3B8'},
                ].map(({l,v,c})=>(
                  <div key={l} style={{background:`${c}10`,border:`0.5px solid ${c}30`,borderRadius:7,padding:'6px 8px'}}>
                    <div style={{fontSize:8,color:'var(--muted)',marginBottom:2,textTransform:'uppercase'}}>{l}</div>
                    <div style={{fontSize:9,color:c,fontWeight:600,lineHeight:1.3}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Panel derecho */}
          <div className="scroll" style={{borderLeft:'1px solid var(--border)',padding:12,background:'var(--bg)',display:'flex',flexDirection:'column',gap:12}}>
            <div>
              <div className="section-label">Narrativa del Ecosistema — IA</div>
              <button onClick={generateNarrative} disabled={generating} className="btn btn-primary" style={{width:'100%',marginBottom:8,fontSize:11,opacity:generating?.6:1}}>
                {generating?'Generando…':aiText?'Regenerar ↻':'Narrar ecosistema →'}
              </button>
              {aiText?<p style={{fontSize:10,color:'#8A9AB8',lineHeight:1.8,animation:'fadeIn .4s'}}>{aiText}</p>:<p style={{fontSize:10,color:'var(--dim)',fontStyle:'italic'}}>Pulsa para que la IA narre cómo vive y evoluciona este planeta.</p>}
            </div>

            <div style={{borderTop:'1px solid var(--border)',paddingTop:12}}>
              <div className="section-label">Análogos terrestres</div>
              {[
                {cond:vals.O2>15&&vals.Ca>20,n:"Homo sapiens",d:"Alta Ca+O₂",c:"#F87171"},
                {cond:vals.H2S>1&&vals.O2<5,n:"Riftia pachyptila",d:"Fumarola H₂S",c:"#FBBF24"},
                {cond:vals.Temp<=-20,n:"Dissostichus mawsoni",d:"Antártico AFP",c:"#60A5FA"},
                {cond:vals.Si>100&&vals.H2O>10,n:"Thalassiosira sp.",d:"Diatomea silícea",c:"#A78BFA"},
                {cond:vals.V>200&&vals.H2O>20,n:"Ascidia ceratodes",d:"Vanadio → sangre verde",c:"#4ADE80"},
                {cond:vals.Cu>60&&vals.Fe<20,n:"Octopus vulgaris",d:"Cu alto → hemocianina",c:"#60A5FA"},
                {cond:vals.pH<3,n:"Picrophilus torridus",d:"Arquea ácida pH 2",c:"#F87171"},
                {cond:vals.Temp>80,n:"Pyrolobus fumarii",d:"Hipertermófila 121°C",c:"#FBBF24"},
                {cond:vals.Ni>100,n:"Methanobacterium sp.",d:"Ni → metanogénesis",c:"#94A3B8"},
              ].filter(a=>a.cond).slice(0,5).map(a=>(
                <div key={a.n} style={{background:`${a.c}08`,border:`0.5px solid ${a.c}30`,borderRadius:6,padding:'6px 9px',marginBottom:5}}>
                  <div style={{fontSize:10,fontStyle:'italic',color:a.c,fontWeight:600}}>{a.n}</div>
                  <div style={{fontSize:9,color:'var(--muted)'}}>{a.d}</div>
                </div>
              ))}
            </div>

            <div style={{borderTop:'1px solid var(--border)',paddingTop:12}}>
              <div className="section-label">Ciclos minerales activos</div>
              {[
                {n:"Carbono",   a:true,                c:"#4ADE80"},
                {n:"Nitrógeno", a:vals.Mo>=0.5,        c:"#60A5FA"},
                {n:"Fósforo",   a:vals.P>=0.1,         c:"#FBBF24"},
                {n:"Hierro",    a:vals.Fe>=10,          c:"#F87171"},
                {n:"Calcio",    a:vals.Ca>=10,          c:"#FBBF24"},
                {n:"Azufre",    a:vals.H2S>0.1||vals.S>500,c:"#A78BFA"},
                {n:"Vanadio",   a:vals.V>100,           c:"#4ADE80"},
                {n:"Níquel",    a:vals.Ni>20,           c:"#94A3B8"},
              ].map(({n,a,c})=>(
                <div key={n} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:a?c:'var(--dim)',flexShrink:0,boxShadow:a?`0 0 4px ${c}`:'none'}}/>
                  <span style={{fontSize:10,color:a?c:'var(--dim)'}}>{n}</span>
                  {a&&<span style={{fontSize:8,color:c,marginLeft:'auto'}}>activo</span>}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* CREATURES TAB */}
      {tab==='creatures'&&(
        <div style={{padding:20,maxWidth:1000,margin:'0 auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Criaturas de este planeta</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>Generadas por el motor evolutivo · Cada una es única e irrepetible</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:10,color:'var(--muted)'}}>Número de criaturas:</span>
              <div style={{display:'flex',gap:4}}>
                {[1,2,3,4,5,6].map(n=>(
                  <button key={n} onClick={()=>setNumCreatures(n)} style={{width:28,height:28,borderRadius:5,border:`0.5px solid ${numCreatures===n?'var(--teal)':'var(--border)'}`,background:numCreatures===n?'var(--teal-dim)':'transparent',color:numCreatures===n?'var(--teal)':'var(--muted)',cursor:'pointer',fontSize:11,fontFamily:'inherit'}}>{n}</button>
                ))}
              </div>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
            {currentCreatures.map((cr,i)=>(
              <CreatureCard key={`${cr.seed}-${i}`} profile={cr} planetCode={generatePlanetCode(vals)} idx={i}/>
            ))}
          </div>
        </div>
      )}

      {/* ECOSYSTEM TAB */}
      {tab==='ecosystem'&&(
        <div style={{padding:20,maxWidth:900,margin:'0 auto'}}>
          <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Equilibrio del Ecosistema</div>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:16}}>Dinámica de poblaciones basada en condiciones minerales · Modelo Lotka-Volterra adaptado</div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
            {[
              {name:"Productores",      pop:score>0.5?80:score>0.3?40:15, max:100,col:"#4ADE80",desc:`${vals.Mg>12?'Fotosíntesis activa':'Quimiosíntesis'} · Base energética`},
              {name:"Herbívoros I",     pop:score>0.5?45:score>0.3?20:8,  max:60, col:"#60A5FA",desc:`${vals.Ca>20?'Exoesqueleto mineralizado':'Sin esqueleto rígido'}`},
              {name:"Carnívoros",       pop:score>0.5?22:score>0.3?10:3,  max:35, col:"#F87171",desc:`${vals.O2>15?'Metabolismo aeróbico eficiente':'Limitados por O₂'}`},
              {name:"Depredadores Apex",pop:score>0.5?8:score>0.3?3:1,   max:15, col:"#FBBF24",desc:`${score>0.7?'Ecosistema estable':'Población en riesgo'}`},
              {name:"Descomponedores",  pop:score>0.3?65:20,              max:80, col:"#A78BFA",desc:`Ciclan ${[vals.P>0.1&&'P',vals.Fe>10&&'Fe',vals.Ca>10&&'Ca'].filter(Boolean).join(', ')||'minerales'}`},
              {name:"Quimioautos",      pop:vals.H2S>1?55:vals.S>1000?30:5,max:70,col:"#FBBF24",desc:vals.H2S>1?'H₂S abundante — activos':vals.S>1000?'S disponible — moderados':'H₂S insuficiente'},
            ].map(n=>{
              const pct=Math.round(n.pop/n.max*100);
              const danger=pct<20;
              return(
                <div key={n.name} className="card">
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <span style={{fontSize:11,fontWeight:600,color:n.col}}>{n.name}</span>
                    <span style={{fontSize:11,fontFamily:'JetBrains Mono,monospace',color:danger?'#F87171':n.col}}>{n.pop}</span>
                  </div>
                  <div style={{height:4,background:'rgba(255,255,255,0.06)',borderRadius:2,marginBottom:8}}>
                    <div style={{height:'100%',width:`${pct}%`,background:danger?'#F87171':n.col,borderRadius:2,transition:'width .5s',boxShadow:danger?'none':`0 0 6px ${n.col}60`}}/>
                  </div>
                  <div style={{fontSize:9,color:'var(--muted)',lineHeight:1.5}}>{n.desc}</div>
                  {danger&&<div style={{fontSize:9,color:'#F87171',marginTop:4}}>⚠ Riesgo de extinción</div>}
                </div>
              );
            })}
          </div>

          <div style={{background:'rgba(0,212,170,0.05)',border:'0.5px solid rgba(0,212,170,0.2)',borderRadius:12,padding:16,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--teal)',marginBottom:6}}>
              {score>=0.7?'✓ Ecosistema estable — equilibrio trófico':score>=0.4?'⚠ Ecosistema frágil — algunas especies en riesgo':'✗ Colapso probable — condiciones extremas'}
            </div>
            <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.7}}>
              Score de habitabilidad: <b style={{color:'var(--teal)'}}>{Math.round(score*100)}%</b>. 
              Ciclos activos: <b style={{color:'#4ADE80'}}>{[vals.Fe>=10&&'Fe',vals.Ca>=10&&'Ca',vals.P>=0.1&&'P',vals.H2S>0.1&&'S',vals.Mg>=10&&'Mg',vals.Mo>=0.5&&'Mo'].filter(Boolean).join(', ')||'ninguno'}</b>.
              Temperatura: <b style={{color:vals.Temp>50?'#F87171':vals.Temp<-20?'#60A5FA':'#4ADE80'}}>{vals.Temp}°C</b>. 
              Gravedad: <b style={{color:'#A78BFA'}}>{vals.gravity}g</b>.
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div className="card">
              <div className="section-label">Flujo de energía</div>
              {[
                {from:"Luz/Química",to:"Productores",pct:100,col:"#4ADE80"},
                {from:"Productores",to:"Herbívoros",pct:Math.round(score*70),col:"#60A5FA"},
                {from:"Herbívoros",to:"Carnívoros",pct:Math.round(score*40),col:"#F87171"},
                {from:"Todos",to:"Descomponedores",pct:Math.round(score*80),col:"#A78BFA"},
              ].map(({from,to,pct,col})=>(
                <div key={from} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <span style={{fontSize:9,color:'var(--muted)',width:80,textAlign:'right',flexShrink:0}}>{from}</span>
                  <div style={{flex:1,height:6,background:'rgba(255,255,255,0.04)',borderRadius:3}}>
                    <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${col}80,${col})`,borderRadius:3,boxShadow:`0 0 6px ${col}40`}}/>
                  </div>
                  <span style={{fontSize:9,color:col,width:70,flexShrink:0}}>{to}</span>
                </div>
              ))}
            </div>
            <div className="card">
              <div className="section-label">Factores limitantes</div>
              {[
                {n:"Fósforo (P)",     pct:Math.min(vals.P/1.5*100,100),  col:"#FBBF24",crit:vals.P<0.1},
                {n:"Calcio (Ca)",     pct:Math.min(vals.Ca/50*100,100),   col:"#4ADE80",crit:vals.Ca<5},
                {n:"Hierro (Fe)",     pct:Math.min(vals.Fe/50*100,100),   col:"#F87171",crit:vals.Fe<5},
                {n:"Molibdeno (Mo)",  pct:Math.min(vals.Mo/2*100,100),    col:"#60A5FA",crit:vals.Mo<0.2},
                {n:"Agua (H₂O)",      pct:vals.H2O,                       col:"#60A5FA",crit:vals.H2O<10},
                {n:"Oxígeno (O₂)",    pct:Math.min(vals.O2/21*100,100),   col:"#00D4AA",crit:vals.O2<5},
              ].map(({n,pct,col,crit})=>(
                <div key={n} style={{marginBottom:7}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:9,marginBottom:2}}>
                    <span style={{color:crit?'#F87171':'var(--muted)'}}>{n}{crit?' ⚠':''}</span>
                    <span style={{color:crit?'#F87171':col,fontFamily:'JetBrains Mono,monospace'}}>{Math.round(pct)}%</span>
                  </div>
                  <div style={{height:3,background:'rgba(255,255,255,0.05)',borderRadius:2}}>
                    <div style={{height:'100%',width:`${Math.round(pct)}%`,background:crit?'#F87171':col,borderRadius:2}}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* GALLERY TAB */}
      {tab==='gallery'&&(
        <div style={{padding:20,maxWidth:1000,margin:'0 auto'}}>
          <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Galería IA · Imágenes Únicas</div>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:16}}>Imágenes generadas por IA según la composición actual · Cada render es irrepetible</div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
            <div>
              <div className="section-label">Vista orbital del planeta</div>
              <AIImage prompt={buildPlanetImagePrompt(vals)} width={600} height={380} style={{height:280}}/>
            </div>
            <div>
              <div className="section-label">Superficie del planeta</div>
              <AIImage
                prompt={`Alien planet surface level view, ${vals.Temp>50?'volcanic hot lava':''}${vals.Temp<-20?'frozen icy tundra':''}${vals.H2S>2?'sulfuric acid geysers':''}${vals.O2>15&&vals.Mg>15?'alien vegetation':'rocky barren'} landscape, dramatic alien sky, scientifically accurate, hyper detailed, 8k`}
                width={600} height={380} style={{height:280}}/>
            </div>
          </div>

          <div className="section-label">Criaturas de este planeta — Arte conceptual</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
            {currentCreatures.map((cr,i)=>(
              <div key={i} style={{background:'var(--bg2)',borderRadius:10,overflow:'hidden',border:'0.5px solid var(--border)'}}>
                <AIImage prompt={cr.imagePrompt} width={400} height={300} style={{height:180,borderRadius:0}}/>
                <div style={{padding:'8px 10px'}}>
                  <div style={{fontSize:10,fontStyle:'italic',color:cr.orgColor,fontWeight:600}}>{cr.latinName}</div>
                  <div style={{fontSize:9,color:'var(--muted)',marginTop:2}}>{cr.complexity} · {cr.metabolism}</div>
                </div>
              </div>
            ))}
          </div>

          <div style={{marginTop:14,padding:12,background:'var(--bg2)',borderRadius:10,border:'0.5px solid var(--border)'}}>
            <div className="section-label">Ecosistema completo — Vista aérea</div>
            <AIImage
              prompt={`Aerial view of alien ecosystem with ${currentCreatures.length} unique species, ${vals.H2O>30?'alien ocean with creatures':'alien landscape with organisms'}, ${vals.Temp<-20?'frozen':''}${vals.Temp>50?'volcanic':''}${vals.H2S>2?'sulfuric':'temperate'} environment, multiple alien life forms visible, scientifically coherent alien biology, stunning aerial photography, 8k ultra detailed`}
              width={900} height={400} style={{height:250}}/>
          </div>
        </div>
      )}

      {showModal&&<PlanetCreatedModal planetCode={planetCode} vals={vals} onClose={()=>setShowModal(false)} creatures={creatures}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
