<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BioPlanet — Simulador Evolutivo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#00D4AA;--teal-d:rgba(0,212,170,0.12);
  --amber:#F5A623;--red:#F87171;--blue:#60A5FA;--purple:#A78BFA;--green:#4ADE80;
  --bg:#03060E;--bg2:#070D1A;--bg3:#0C1525;
  --border:rgba(255,255,255,0.07);--text:#DDE6F5;--muted:#5A6A88;--dim:#1A2A40;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;font-size:13px;}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--teal);cursor:pointer;}
.scroll{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--dim) transparent;}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;padding:14px;}
.btn{padding:7px 14px;border-radius:7px;border:0.5px solid var(--border);background:transparent;color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--bg3);border-color:var(--teal);}
.btn-teal{border-color:var(--teal);background:var(--teal-d);color:var(--teal);}
.btn-teal:hover{background:var(--teal);color:#000;}
.label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;font-weight:600;}
.tag{display:inline-block;font-size:9px;padding:2px 8px;border-radius:99px;font-weight:600;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,212,170,0.2)}50%{box-shadow:0 0 40px rgba(0,212,170,0.5)}}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
</style>
</head>
<body>

<!-- ESTRUCTURA PRINCIPAL -->
<div id="app" style="display:flex;flex-direction:column;height:100vh;">

  <!-- HEADER -->
  <div id="header" style="display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:48px;border-bottom:1px solid var(--border);background:rgba(3,6,14,0.95);flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:8px;">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#00D4AA" stroke-width="1.4"/><ellipse cx="10" cy="10" rx="8" ry="3" stroke="#00D4AA" stroke-width="0.8" stroke-dasharray="2 2"/><circle cx="10" cy="10" r="2.5" fill="#00D4AA" opacity=".5"/></svg>
      <b style="font-size:14px;">Bio<span style="color:var(--teal)">Planet</span></b>
      <span style="font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace;">v3.0</span>
    </div>
    <div id="tab-btns" style="display:flex;gap:3px;"></div>
    <button onclick="createPlanet()" class="btn btn-teal" style="font-weight:700;font-size:11px;">✦ Crear Planeta</button>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <div id="main" style="flex:1;overflow:hidden;"></div>
</div>

<!-- MODAL PLANETA CREADO -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
  <div style="background:var(--bg2);border:1px solid rgba(0,212,170,0.3);border-radius:16px;padding:28px;max-width:520px;width:90%;max-height:90vh;overflow-y:auto;animation:fadeIn .3s ease;box-shadow:0 0 60px rgba(0,212,170,0.2);">
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:10px;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;">✦ Planeta Registrado ✦</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:10px;">Tu planeta es único en el universo</div>
      <div id="modal-code" style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--teal);background:var(--teal-d);border:1px solid rgba(0,212,170,0.3);border-radius:8px;padding:10px 20px;display:inline-block;letter-spacing:.12em;animation:glow 2s ease infinite;"></div>
      <div style="font-size:10px;color:var(--muted);margin-top:8px;">Este código identifica tu planeta — nadie más puede tenerlo igual</div>
    </div>
    <div id="modal-planet-img" style="height:200px;border-radius:10px;overflow:hidden;margin-bottom:14px;background:var(--bg3);display:flex;align-items:center;justify-content:center;">
      <button onclick="genModalImg()" class="btn btn-teal" style="font-size:11px;">🌍 Generar imagen IA de tu planeta</button>
    </div>
    <div id="modal-stats" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;"></div>
    <div id="modal-creatures" style="margin-bottom:16px;"></div>
    <div style="display:flex;gap:8px;">
      <button onclick="copyCode()" class="btn btn-teal" style="flex:1;">📋 Copiar código</button>
      <button onclick="closeModal()" class="btn" style="flex:1;">Explorar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATOS
// ═══════════════════════════════════════════════════════
const PRESETS={
  "Tierra":      {Ca:41,Fe:56,Si:282,P:1.0,Mg:23,Cu:60,S:350,Ni:84,V:120,O2:21,CO2:0.04,H2S:0,H2O:71,Temp:15,pH:7.2,pressure:1.0,gravity:1.0},
  "Europa":      {Ca:15,Fe:10,Si:50, P:0.2,Mg:50,Cu:40,S:2000,Ni:50,V:200,O2:2, CO2:0.5,H2S:0.5,H2O:100,Temp:-5,pH:8.5,pressure:0.5,gravity:0.13},
  "Volcánico":   {Ca:30,Fe:40,Si:200,P:0.5,Mg:20,Cu:200,S:15000,Ni:200,V:500,O2:5,CO2:5,H2S:8,H2O:30,Temp:70,pH:3.5,pressure:2.0,gravity:0.9},
  "Glacial":     {Ca:10,Fe:20,Si:250,P:0.1,Mg:15,Cu:20,S:100,Ni:20,V:50,O2:22,CO2:0.03,H2S:0,H2O:80,Temp:-40,pH:6.5,pressure:0.8,gravity:0.7},
  "Sulfúrico":   {Ca:5, Fe:30,Si:180,P:0.2,Mg:10,Cu:50,S:20000,Ni:100,V:300,O2:0.5,CO2:2,H2S:9,H2O:20,Temp:50,pH:2.5,pressure:3.0,gravity:1.1},
  "Carbonífero": {Ca:55,Fe:35,Si:275,P:0.8,Mg:23,Cu:60,S:500,Ni:80,V:100,O2:30,CO2:0.1,H2S:0,H2O:45,Temp:28,pH:6.5,pressure:1.2,gravity:1.0},
  "Titán":       {Ca:5, Fe:8, Si:100,P:0.1,Mg:8, Cu:10,S:500,Ni:10,V:20,O2:0,CO2:0.1,H2S:0.1,H2O:0,Temp:-179,pH:7.0,pressure:1.5,gravity:0.14},
  "Marte Arcaico":{Ca:20,Fe:80,Si:310,P:0.3,Mg:30,Cu:10,S:5000,Ni:30,V:80,O2:0.1,CO2:95,H2S:0,H2O:15,Temp:-20,pH:7.0,pressure:0.8,gravity:0.38},
  "Kepler-442b": {Ca:60,Fe:70,Si:300,P:1.5,Mg:30,Cu:80,S:800,Ni:100,V:150,O2:25,CO2:0.08,H2S:0,H2O:60,Temp:20,pH:7.0,pressure:1.3,gravity:1.3},
  "Oceánico":    {Ca:25,Fe:15,Si:30, P:0.5,Mg:60,Cu:80,S:3000,Ni:60,V:200,O2:8,CO2:1,H2S:0.3,H2O:100,Temp:10,pH:8.0,pressure:2.0,gravity:0.9},
};

const SLIDERS=[
  {sym:"Ca",  label:"Calcio",    unit:"K ppm",min:0,  max:100, step:1,  def:41,  g:"Suelo",    col:"#4ADE80"},
  {sym:"Fe",  label:"Hierro",   unit:"K ppm",min:0,  max:100, step:1,  def:56,  g:"Suelo",    col:"#F87171"},
  {sym:"Si",  label:"Silicio",  unit:"K ppm",min:0,  max:350, step:5,  def:282, g:"Suelo",    col:"#60A5FA"},
  {sym:"P",   label:"Fósforo",  unit:"K ppm",min:0,  max:5,   step:0.1,def:1.0, g:"Suelo",    col:"#FBBF24"},
  {sym:"Mg",  label:"Magnesio", unit:"K ppm",min:0,  max:60,  step:1,  def:23,  g:"Suelo",    col:"#4ADE80"},
  {sym:"Cu",  label:"Cobre",   unit:"ppm",  min:0,  max:300, step:1,  def:60,  g:"Suelo",    col:"#60A5FA"},
  {sym:"S",   label:"Azufre",  unit:"ppm",  min:0,  max:25000,step:100,def:350,g:"Suelo",    col:"#FBBF24"},
  {sym:"Ni",  label:"Níquel",  unit:"ppm",  min:0,  max:500, step:1,  def:84,  g:"Suelo",    col:"#94A3B8"},
  {sym:"V",   label:"Vanadio", unit:"ppm",  min:0,  max:1000,step:5,  def:120, g:"Suelo",    col:"#A78BFA"},
  {sym:"O2",  label:"Oxígeno", unit:"%",    min:0,  max:35,  step:0.5,def:21,  g:"Atmósfera",col:"#00D4AA"},
  {sym:"CO2", label:"CO₂",     unit:"%",    min:0,  max:20,  step:0.1,def:0.04,g:"Atmósfera",col:"#FBBF24"},
  {sym:"H2S", label:"H₂S",     unit:"%",    min:0,  max:10,  step:0.1,def:0,   g:"Atmósfera",col:"#F87171"},
  {sym:"H2O", label:"Agua",    unit:"% sup",min:0,  max:100, step:1,  def:71,  g:"Entorno",  col:"#60A5FA"},
  {sym:"Temp",label:"Temp",    unit:"°C",   min:-200,max:200,step:1,  def:15,  g:"Entorno",  col:"#F87171"},
  {sym:"pH",  label:"pH",      unit:"",     min:0,  max:14,  step:0.1,def:7.2, g:"Entorno",  col:"#A78BFA"},
  {sym:"gravity",label:"Gravedad",unit:"g", min:0.01,max:5,  step:0.05,def:1.0,g:"Entorno",  col:"#4ADE80"},
];

let vals={};
SLIDERS.forEach(s=>vals[s.sym]=s.def);
let currentTab='planet';
let numCreatures=3;
let lastCreatures=[];

// ═══════════════════════════════════════════════════════
// MOTOR CIENTÍFICO
// ═══════════════════════════════════════════════════════
function calcScore(v){
  let s=0;
  if(v.Temp>=-20&&v.Temp<=50&&v.H2O>0)s+=0.25*Math.min(v.H2O/50,1);
  if(v.O2>=15)s+=0.20;else if(v.O2>=5)s+=0.12;else if(v.CO2>=1||v.H2S>=1)s+=0.06;
  if(v.Ca>=5)s+=0.08;if(v.P>=0.3)s+=0.07;if(v.Fe>=5)s+=0.05;if(v.Mg>=10)s+=0.05;
  if(v.Temp>=-20&&v.Temp<=50)s+=0.15;else if(v.Temp>=-80&&v.Temp<=100)s+=0.07;
  if(v.pH>=5.5&&v.pH<=9)s+=0.07;else if(v.pH>=2&&v.pH<=12)s+=0.03;
  if(v.gravity>=0.3&&v.gravity<=3)s+=0.04;
  return Math.min(s,1.0);
}

function rng(seed,n){return((Math.sin(seed*9301+n*49297+233)%1)+1)%1;}

function makeCreature(v,seed){
  const {Ca,Fe,Si,P,Mg,Cu,S,Ni,V,O2,CO2,H2S,H2O,Temp,pH,gravity}=v;
  const sc=calcScore(v);

  // Esqueleto
  let skeleton,skCol;
  if(Ca>=30&&P>=0.5&&Mg>=5&&Temp>=-50&&Temp<=55&&gravity<=2){skeleton="Endoesqueleto calcico";skCol="#FBBF24";}
  else if(Si>=80&&H2O>=5){skeleton="Exoesqueleto silíceo";skCol="#60A5FA";}
  else if(Ca>=20&&pH>=7.5&&CO2>=0.01){skeleton="Exoesqueleto calcáreo";skCol="#4ADE80";}
  else if(S>5000){skeleton="Exoesqueleto sulfúrico";skCol="#F87171";}
  else{skeleton="Hidrostático/Quitina";skCol="#94A3B8";}

  // Sangre
  let blood,bCol;
  if(Fe>=30&&O2>=2){blood="Hemoglobina (roja)";bCol="#F87171";}
  else if(Cu>=60&&Fe<25){blood="Hemocianina (azul)";bCol="#60A5FA";}
  else if(V>=200&&H2O>20){blood="Vanadina (verde)";bCol="#4ADE80";}
  else if(H2S>1&&O2<8){blood="Hb-H₂S gigante";bCol="#FBBF24";}
  else if(Fe>=10&&Fe<30){blood="Hemeritrina (violeta)";bCol="#A78BFA";}
  else{blood="Difusión directa";bCol="#94A3B8";}

  // Metabolismo
  let meta,metaCol;
  if(O2>=15&&Fe>=1){meta="Aeróbico eficiente";metaCol="#00D4AA";}
  else if(Mg>=12&&O2>=3&&CO2>=0.005){meta="Fotosíntesis";metaCol="#4ADE80";}
  else if(H2S>=1&&S>=100){meta="Quimiosíntesis H₂S";metaCol="#FBBF24";}
  else if(O2<0.1&&CO2>=0.1&&Ni>=20){meta="Metanogénesis";metaCol="#94A3B8";}
  else{meta="Fermentación";metaCol="#94A3B8";}

  // Nervioso
  let nervous,nCol;
  if(O2>=15&&Ca>=25&&Fe>=20){nervous="Cerebro centralizado";nCol="#A78BFA";}
  else if(Ca>=10&&O2>=5){nervous="Sistema gangliado";nCol="#60A5FA";}
  else{nervous="Red difusa";nCol="#94A3B8";}

  // Termorregulación
  let thermo,tCol;
  if(O2>=18&&Temp>=-50&&Temp<=55){thermo="Homeotermo";tCol="#F87171";}
  else if(Temp<=-10){thermo="Crioprotección AFP";tCol="#60A5FA";}
  else if(Temp>=80){thermo="Termoestable";tCol="#FBBF24";}
  else{thermo="Poiquilotermo";tCol="#4ADE80";}

  // Locomoción
  let loco;
  if(gravity<0.3)loco="Flotación/vuelo";
  else if(H2O>50)loco="Natación";
  else if(gravity>2)loco="Rastrero";
  else if(O2>15&&sc>0.6)loco="Cuadrúpedo";
  else loco="Ondulatorio";

  // Tamaño
  const baseSize=Math.max(0.001,sc*100*(gravity<0.5?8:1)*(O2/21)*Math.max(0.1,Ca/41));
  let size;
  if(baseSize>10000)size="Megafauna (>10t)";
  else if(baseSize>500)size="Grande (100kg–10t)";
  else if(baseSize>10)size="Mediano (10–100kg)";
  else if(baseSize>0.1)size="Pequeño (<10kg)";
  else size="Microscópico";

  // Nombre científico
  const genera=["Astrobiota","Xenovita","Cosmozoa","Abiogenus","Exobiota","Lithovita","Chemovita","Thermozoa","Cryptovita","Halobiota","Pyrovita","Glaciovita","Silicovita","Ferrobiota","Cuprovita"];
  const species=["stellaris","extremophilus","mineralis","novus","alienus","profundus","thermalis","glacialis","sulfuricus","magneticus","siliceus","cupriferus","vanadicus","ferrophilus","calcarius"];
  const genus=genera[Math.floor(rng(seed,3)*genera.length)];
  const sp=species[Math.floor(rng(seed,4)*species.length)];

  // Complejidad
  const complexity=sc>0.75?"vertebrado":sc>0.55?"invertebrado":sc>0.35?"simple":sc>0.15?"colonial":"unicelular";

  // Color organismo
  const orgCol=bCol;

  return {latinName:`${genus} ${sp}`,complexity,skeleton,skCol,blood,bCol,meta,metaCol,nervous,nCol,thermo,tCol,loco,size,orgCol,seed,sc,
    imgPrompt:`Hyper-detailed scientific concept art of ${genus} ${sp}, a ${complexity} alien organism, ${skeleton.toLowerCase()}, ${blood.toLowerCase()}, ${meta.toLowerCase()} metabolism, ${loco.toLowerCase()} locomotion, ${size.toLowerCase()}, bioluminescent, scientifically coherent alien biology, otherworldly environment, dramatic lighting, 8k ultra detailed, stunning composition`};
}

function planetCode(v){
  const keys=["Ca","Fe","Si","P","Mg","Cu","S","O2","CO2","H2S","H2O","Temp","pH","gravity"];
  let h=0;
  keys.forEach((k,i)=>{const n=Math.round((v[k]||0)*100);h=(h^(n*(i+1)*2654435761))>>>0;});
  const b=h.toString(36).toUpperCase().padStart(8,"0");
  const pfx=v.H2O>50?"OCN":v.H2S>3?"VLC":v.Temp<-30?"GLC":v.O2>20?"TER":"XEN";
  return `BP-${pfx}-${b.slice(0,3)}-${b.slice(3,6)}-${b.slice(6,8)}`;
}

function planetImgPrompt(v){
  const {H2O,Temp,H2S,O2,CO2,Fe,Ca,S}=v;
  const sulf=H2S>2||S>5000,hot=Temp>50,cold=Temp<-30;
  const atm=sulf?"yellow sulfuric clouds":CO2>5?"thick orange CO2 atmosphere":O2>20?"clear blue atmosphere":"dark hazy atmosphere";
  const surf=sulf?"yellow sulfur flats":cold?"icy frozen tundra":hot?"volcanic rocky terrain":Fe>50?"red iron oxide desert":"green blue terrain";
  const ft=[];
  if(H2O>30)ft.push(sulf?"acid seas":"alien oceans");
  if(cold)ft.push("ice caps","glaciers");
  if(H2S>3)ft.push("volcanic geysers");
  if(O2>20)ft.push("alien vegetation");
  return `Photorealistic alien planet from orbit, ${surf}, ${atm}${ft.length?", "+ft.join(", "):""}, dramatic star lighting, NASA style photography, 8k ultra detailed`;
}

// ═══════════════════════════════════════════════════════
// IMAGEN IA (Pollinations - gratuito)
// ═══════════════════════════════════════════════════════
function makeAIImg(prompt,w,h,containerId){
  const el=document.getElementById(containerId);
  if(!el)return;
  const seed=Math.floor(Math.random()*99999);
  const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${w}&height=${h}&seed=${seed}&nologo=true`;
  el.innerHTML=`
    <div id="${containerId}-loader" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;background:var(--bg3);">
      <div style="width:28px;height:28px;border:3px solid rgba(0,212,170,0.3);border-top:3px solid #00D4AA;border-radius:50%;animation:spin 1s linear infinite;"></div>
      <div style="font-size:9px;color:var(--dim);">Generando imagen IA…</div>
    </div>
    <img src="${url}" style="width:100%;height:100%;object-fit:cover;display:none;border-radius:inherit;"
      onload="this.style.display='block';document.getElementById('${containerId}-loader').style.display='none';"
      onerror="document.getElementById('${containerId}-loader').innerHTML='<div style=\\'font-size:10px;color:var(--dim);text-align:center;padding:16px;\\'>🎨 Conecta internet para imágenes IA</div>';"/>`;
}

// ═══════════════════════════════════════════════════════
// PLANET 3D
// ═══════════════════════════════════════════════════════
let threeState={};
function initThree(canvasId){
  const c=document.getElementById(canvasId);
  if(!c||!window.THREE)return;
  const T=window.THREE;
  const W=c.parentElement.clientWidth||500,H=c.parentElement.clientHeight||400;
  c.width=W;c.height=H;
  const scene=new T.Scene(),cam=new T.PerspectiveCamera(45,W/H,0.1,100);
  cam.position.z=3.5;
  const renderer=new T.WebGLRenderer({canvas:c,antialias:true});
  renderer.setSize(W,H);renderer.setClearColor(0x03060E,1);
  const sp=[];for(let i=0;i<1000;i++)sp.push((Math.random()-.5)*200,(Math.random()-.5)*200,(Math.random()-.5)*200);
  const stars=new T.Points(new T.BufferGeometry(),new T.PointsMaterial({color:0xffffff,size:0.07}));
  stars.geometry.setAttribute('position',new T.Float32BufferAttribute(sp,3));
  scene.add(stars);
  const grp=new T.Group();scene.add(grp);
  const planet=new T.Mesh(new T.SphereGeometry(1,64,64),new T.MeshPhongMaterial({specular:new T.Color(0x222222),shininess:20}));
  grp.add(planet);
  const csz=256,cv=document.createElement('canvas');cv.width=cv.height=csz;
  const cx2=cv.getContext('2d'),ci=cx2.createImageData(csz,csz),cd=ci.data;
  function ch(x,y){return((Math.sin(x*97+y*271)*43758)%1+1)%1;}
  function cn(x,y){const X=Math.floor(x),Y=Math.floor(y),f=x-X,g=y-Y,a=ch(X,Y),b=ch(X+1,Y),cc=ch(X,Y+1),d=ch(X+1,Y+1),u=f*f*(3-2*f),vv=g*g*(3-2*g);return a+(b-a)*u+(cc-a)*vv+(a-b-cc+d)*u*vv;}
  for(let y=0;y<csz;y++)for(let x=0;x<csz;x++){const vv=cn(x/csz*6,y/csz*6)*.6+cn(x/csz*12,y/csz*12)*.4;const al=vv>0.52?Math.min((vv-.52)*5*255,180):0;const i=(y*csz+x)*4;cd[i]=255;cd[i+1]=255;cd[i+2]=255;cd[i+3]=al;}
  cx2.putImageData(ci,0,0);
  const clouds=new T.Mesh(new T.SphereGeometry(1.015,32,32),new T.MeshPhongMaterial({map:new T.CanvasTexture(cv),transparent:true,opacity:.5,depthWrite:false}));
  grp.add(clouds);
  const atm=new T.Mesh(new T.SphereGeometry(1.12,32,32),new T.MeshPhongMaterial({color:0x00D4AA,transparent:true,opacity:.08,side:T.BackSide}));
  grp.add(atm);
  const dl=new T.DirectionalLight(0xffffff,1.4);dl.position.set(5,3,5);scene.add(dl);
  scene.add(new T.AmbientLight(0x151515,.9));
  let drag=false,prev={x:0,y:0},zoom=3.5,animId;
  function makeTex(v){
    const sz=256,cv2=document.createElement('canvas');cv2.width=cv2.height=sz;
    const ctx=cv2.getContext('2d'),img=ctx.createImageData(sz,sz),d=img.data;
    const {Fe,Mg,Ca,H2S,S,Temp,O2,H2O}=v;
    const sulf=H2S>2||S>5000,hot=Temp>50,cold=Temp<-30,green=Mg>20&&O2>8&&!sulf&&!hot;
    function hs(x,y){return((Math.sin(x*127.1+y*311.7)*43758.5453)%1+1)%1;}
    function ns(x,y){const X=Math.floor(x),Y=Math.floor(y),fx=x-X,gy=y-Y,a=hs(X,Y),b=hs(X+1,Y),cc=hs(X,Y+1),dd=hs(X+1,Y+1),u=fx*fx*(3-2*fx),vv=gy*gy*(3-2*gy);return a+(b-a)*u+(cc-a)*vv+(a-b-cc+dd)*u*vv;}
    let bR=sulf?180:cold?100:hot?170:green?40:Fe>50?150:50;
    let bG=sulf?150:cold?140:hot?60:green?110:Fe>50?70:100;
    let bB=sulf?20:cold?190:hot?20:green?50:Fe>50?30:70;
    for(let y=0;y<sz;y++){const lat=y/sz;for(let x=0;x<sz;x++){
      const n1=ns(x/sz*8,lat*8)*.5+ns(x/sz*16,lat*16)*.3+ns(x/sz*32,lat*32)*.2;
      const n2=ns(x/sz*4+3.7,lat*4+2.1);
      const ocean=H2O>25&&n1<0.35,polar=(lat<0.1||lat>0.9)&&!sulf&&!hot;
      let r,g,b;
      if(polar){r=220;g=235;b=255;}
      else if(ocean){r=sulf?60:20+n2*20;g=sulf?90:55+n2*30;b=sulf?30:140+n2*40;}
      else{r=bR+(n1-.5)*40;g=bG+(n1-.5)*30;b=bB+(n1-.5)*25;}
      const i=(y*sz+x)*4;d[i]=Math.max(0,Math.min(255,r));d[i+1]=Math.max(0,Math.min(255,g));d[i+2]=Math.max(0,Math.min(255,b));d[i+3]=255;
    }}
    ctx.putImageData(img,0,0);return new T.CanvasTexture(cv2);
  }
  function updatePlanet(v){
    planet.material.map=makeTex(v);planet.material.map.needsUpdate=true;
    const sc=calcScore(v);
    const ac=v.H2S>2?0xD4A017:v.CO2>5?0xF5A623:sc>0.6?0x00D4AA:0x334466;
    atm.material.color.set(ac);
    clouds.material.opacity=v.H2O>20?.5:v.H2O>5?.2:.05;
  }
  updatePlanet(vals);
  const dn=e=>{drag=true;prev={x:e.clientX,y:e.clientY};};
  const up=()=>drag=false;
  const mv=e=>{if(!drag)return;grp.rotation.y+=(e.clientX-prev.x)*.008;grp.rotation.x+=(e.clientY-prev.y)*.008;prev={x:e.clientX,y:e.clientY};};
  const wh=e=>{zoom=Math.max(1.8,Math.min(6,zoom+e.deltaY*.005));cam.position.z=zoom;e.preventDefault();};
  c.addEventListener('mousedown',dn);window.addEventListener('mouseup',up);window.addEventListener('mousemove',mv);c.addEventListener('wheel',wh,{passive:false});
  function anim(){animId=requestAnimationFrame(anim);if(!drag){grp.rotation.y+=.002;clouds.rotation.y-=.0005;}renderer.render(scene,cam);}
  anim();
  threeState={updatePlanet,cleanup:()=>{cancelAnimationFrame(animId);c.removeEventListener('mousedown',dn);window.removeEventListener('mouseup',up);window.removeEventListener('mousemove',mv);c.removeEventListener('wheel',wh);renderer.dispose();}};
}

// RENDER TABS
// ═══════════════════════════════════════════════════════
const TABS=[
  {id:'planet',   label:'🌍 Planeta'},
  {id:'creatures',label:'🦎 Criaturas'},
  {id:'ecosystem',label:'🕸 Ecosistema'},
  {id:'gallery',  label:'🎨 Galería IA'},
];

function buildTabBtns(){
  const el=document.getElementById('tab-btns');
  el.innerHTML=TABS.map(t=>`<button onclick="switchTab('${t.id}')" id="tab-${t.id}" style="padding:4px 12px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;background:${t.id===currentTab?'var(--teal)':'transparent'};color:${t.id===currentTab?'#000':'var(--muted)'};transition:all .15s;font-family:inherit;">${t.label}</button>`).join('');
}

function switchTab(tab){
  currentTab=tab;
  buildTabBtns();
  renderMain();
}

function renderMain(){
  if(threeState.cleanup){threeState.cleanup();threeState={};}
  const el=document.getElementById('main');
  if(currentTab==='planet')renderPlanet(el);
  else if(currentTab==='creatures')renderCreatures(el);
  else if(currentTab==='ecosystem')renderEcosystem(el);
  else if(currentTab==='gallery')renderGallery(el);
}

function generateCreatureSeed(v,i){
  const keys=["Ca","Fe","Si","P","Mg","Cu","O2","H2S","Temp","pH"];
  return Math.abs(keys.reduce((a,k,j)=>a+(v[k]||0)*(j+1),i*1000))%99999;
}

  const creatures=Array.from({length:numCreatures},(_,i)=>makeCreature(vals,generateCreatureSeed(vals,i)));

            {n:"Calcio (Ca)",pct:Math.min(vals.Ca/50*100,100),col:"#4ADE80",crit:vals.Ca<5},
            {n:"Hierro (Fe)",pct:Math.min(vals.Fe/50*100,100),col:"#F87171",crit:vals.Fe<5},

    </div>`;
}

// ═══════════════════════════════════════════════════════
// ACCIONES
// ═══════════════════════════════════════════════════════
function setVal(sym,v){
  vals[sym]=v;
  const vl=document.getElementById('vl-'+sym);
  if(vl){const m=SLIDERS.find(s=>s.sym===sym);const dec=m.step<1?(m.step<0.01?4:2):0;vl.textContent=`${v.toFixed(dec)} ${m.unit}`;}
  // Actualizar score y código en tiempo real
  const score=calcScore(vals);
  const sc=Math.round(score*100);
  const scoreCol=score>=0.7?'#00D4AA':score>=0.4?'#FBBF24':'#F87171';
  const scoreLbl=score>=0.8?'HABITABLE':score>=0.6?'MODERADO':score>=0.4?'MARGINAL':score>=0.2?'EXTREMO':'INHÓSPITO';
  // Actualizar planet texture
  if(threeState.updatePlanet)threeState.updatePlanet(vals);
}

function applyPreset(name){
  const p=PRESETS[name];
  Object.entries(p).forEach(([sym,v])=>{
    vals[sym]=v;
    const sl=document.querySelector(`input[oninput*="'${sym}'"]`);
    if(sl)sl.value=v;
    const vl=document.getElementById('vl-'+sym);
    if(vl){const m=SLIDERS.find(s=>s.sym===sym);if(m){const dec=m.step<1?(m.step<0.01?4:2):0;vl.textContent=`${v.toFixed(dec)} ${m.unit}`;}}
  });
  if(threeState.updatePlanet)threeState.updatePlanet(vals);
}

function createPlanet(){
  const code=planetCode(vals);
  const score=calcScore(vals);
  const scoreCol=score>=0.7?'#00D4AA':score>=0.4?'#FBBF24':'#F87171';
  const creatures=Array.from({length:numCreatures},(_,i)=>makeCreature(vals,generateCreatureSeed(vals,i)));
  lastCreatures=creatures;

  document.getElementById('modal-code').textContent=code;
  document.getElementById('modal-stats').innerHTML=[
    {l:"Habitabilidad",v:`${Math.round(score*100)}%`,c:scoreCol},
    {l:"Criaturas",v:`${creatures.length}`,c:'var(--teal)'},
    {l:"Temperatura",v:`${vals.Temp}°C`,c:vals.Temp<-20?'#60A5FA':vals.Temp>50?'#F87171':'#4ADE80'},
    {l:"O₂",v:`${vals.O2}%`,c:vals.O2>15?'var(--teal)':'#F87171'},
    {l:"H₂O",v:`${vals.H2O}%`,c:'#60A5FA'},
    {l:"Gravedad",v:`${vals.gravity}g`,c:'#A78BFA'},
  ].map(({l,v,c})=>`
    <div style="background:var(--bg3);border-radius:8px;padding:8px;text-align:center;">
      <div style="font-size:9px;color:var(--muted);margin-bottom:3px;">${l}</div>
      <div style="font-size:12px;font-weight:700;color:${c};">${v}</div>
    </div>`).join('');

  document.getElementById('modal-creatures').innerHTML=`
    <div class="label">Criaturas de tu planeta</div>
    ${creatures.slice(0,3).map(c=>`
      <div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:7px;padding:7px 10px;margin-bottom:5px;">
        <div style="width:8px;height:8px;border-radius:50%;background:${c.orgCol};flex-shrink:0;"></div>
        <div style="flex:1;">
          <div style="font-size:11px;font-style:italic;color:${c.orgCol};font-weight:600;">${c.latinName}</div>
          <div style="font-size:9px;color:var(--muted);">${c.complexity} · ${c.meta}</div>
        </div>
        <span style="font-size:9px;color:var(--muted);">${c.size}</span>
      </div>`).join('')}`;

  document.getElementById('modal-planet-img').innerHTML=`<button onclick="genModalImg()" class="btn btn-teal" style="font-size:11px;">🌍 Generar imagen IA de tu planeta</button>`;
  document.getElementById('modal').style.display='flex';
}

function genModalImg(){
  const el=document.getElementById('modal-planet-img');
  el.style.position='relative';
  makeAIImg(planetImgPrompt(vals),500,300,'modal-planet-img');
}

function closeModal(){document.getElementById('modal').style.display='none';}
function copyCode(){
  const code=document.getElementById('modal-code').textContent;
  navigator.clipboard?.writeText(code).then(()=>{
    const btn=event.target;const orig=btn.textContent;btn.textContent='✓ Copiado';setTimeout(()=>btn.textContent=orig,2000);
  });
}
